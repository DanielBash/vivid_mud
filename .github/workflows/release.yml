name: Release & Publish

on:
  push:
    branches: [main]

jobs:
  release:
    if: |
      github.actor != 'github-actions[bot]' &&
      contains(github.event.head_commit.message, '[RELEASE]') &&
      (
        contains(github.event.head_commit.message, '[MAJOR]') ||
        contains(github.event.head_commit.message, '[MINOR]') ||
        contains(github.event.head_commit.message, '[PATCH]')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          msg="${{ github.event.head_commit.message }}"

          if [[ "$msg" == *"[MAJOR]"* ]]; then
            bump="major"
          elif [[ "$msg" == *"[MINOR]"* ]]; then
            bump="minor"
          elif [[ "$msg" == *"[PATCH]"* ]]; then
            bump="patch"
          else
            echo "No bump tag found."
            exit 1
          fi

          current="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"

          IFS='.' read -r major minor patch <<< "$current"

          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("pyproject.toml")
          content = path.read_text(encoding="utf-8")

          new_version = "${{ steps.version.outputs.new_version }}"

          updated, count = re.subn(
              r'(^version\s*=\s*").*?(")',
              rf'\g<1>{new_version}\2',
              content,
              count=1,
              flags=re.M,
          )

          if count != 1:
              raise SystemExit("Could not update version in pyproject.toml")

          path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml
          git commit -m "Bump version to v${{ steps.version.outputs.new_version }} [skip ci]"
          git push origin HEAD:main

      - name: Create git tag
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ steps.version.outputs.new_version }}"
          git tag -f "$tag"
          git push origin -f "$tag"

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new_version }}"
          name: "v${{ steps.version.outputs.new_version }}"
          generate_release_notes: true
          draft: false
          prerelease: false